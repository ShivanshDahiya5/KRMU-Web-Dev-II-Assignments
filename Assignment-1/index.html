<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Event Dashboard</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <h1>Smart Event Dashboard</h1>
    <div class="container">
        <div class="event-list">
            <h2>Add New Event</h2>
            <form id="eventForm">
                <label for="eventName">Event Name:</label>
                <input type="text" id="eventName" name="eventName" required>
                <br><br>
                <label for="eventDate">Event Date:</label>
                <input type="date" id="eventDate" name="eventDate" required>
                <br><br>
                <label for="category">Category</label>
                <select name="category" id="category">
                    <option>Conference</option>
                    <option>Workshop</option>
                    <option>Meeting</option>
                </select>
                <br><br>
                <label for="Description">Description:</label>
                <textarea id="Desciption"></textarea>
                <button id="Submit" type="submit">Add Event</button>
            </form>
        </div>
        <div class="myevent">
            <h2>My Events</h2>
            <div class="Event">
                <button id="clearBtn">Clear All Events</button>
                <button id="sampleBtn">Add Sample Event</button>
            </div>
            <div class="event_list">
                <p>No events yet. Add your first event!</p>
            </div>
        </div>
    </div>
    <script src="./script.js"></script>
</body>

</html>
